name: Evaluacion y Promocion de Modelos (MLOps)

# 1. Cuándo se dispara este pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  champion-challenger-evaluation:
    runs-on: ubuntu-latest # Usamos el servidor estándar de GitHub

    steps:
      # Paso 1: Clonar el repositorio
      - name: Checkout del código
        uses: actions/checkout@v3

      # Paso 2: Configurar el entorno de Python
      - name: Configurar Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Paso 3: Instalar las librerías necesarias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Paso 4: Ejecutar el script contra el servidor MLflow
      - name: Ejecutar Evaluación Champion vs Challenger
        env:
          # Aquí inyectamos de forma segura las credenciales de tu MLflow
          # Estas se configuran en GitHub -> Settings -> Secrets and variables -> Actions
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_EXPERIMENT_ID: ${{ secrets.MLFLOW_EXPERIMENT_ID }}
          
         run: |
          python evaluacion.py
